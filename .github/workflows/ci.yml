name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.optimize }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        optimize: [Debug, ReleaseSafe]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Zig via ghr
        uses: cataggar/ghr/actions/install@v0.6.1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tools: |
            cataggar/zig@v0.16.0 RWSGOq2NVecA2UPNdBUZykf1CCb147pkmdtYxgb3Ti+JO/wCYvhbAb/U

      - name: Build
        run: zig build -Doptimize=${{ matrix.optimize }}

      - name: Unit tests
        # -Dtest-real-sdk=false: GitHub-hosted Windows runners don't have the
        # WSL container feature enabled, so WslcGetVersion itself fails there
        # (discovered empirically - not just "needs wslcsdk.dll + COM" as
        # this repo previously assumed). Skips only that one link-smoke test
        # pair; everything else (struct/ABI/flag/error-set tests,
        # getMissingComponents, settings-builder tests) still runs for real.
        run: zig build test -Doptimize=${{ matrix.optimize }} -Dtest-real-sdk=false

      # `zig build smoke-test-mcp` (see tools/smoke-test-mcp.ps1) reliably
      # passes on local Windows dev machines (verified with both
      # powershell.exe and pwsh.exe) but consistently fails on GitHub-hosted
      # windows-latest runners with a JSON-RPC "Parse error" on the very
      # first request, for reasons not yet root-caused (not an encoding
      # issue - both a no-BOM StreamWriter and raw UTF-8 byte writes to
      # stdin were tried; stderr capture showed nothing and the process
      # hadn't exited). Left as a manual/local verification step rather
      # than blocking CI on an unresolved, hosted-runner-specific failure -
      # see the git history of this file/tools/smoke-test-mcp.ps1 for the
      # investigation.
