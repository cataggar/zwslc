name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.optimize }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        optimize: [Debug, ReleaseSafe]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Zig via ghr
        uses: cataggar/ghr/actions/install@v0.6.1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tools: |
            cataggar/zig@v0.16.0 RWSGOq2NVecA2UPNdBUZykf1CCb147pkmdtYxgb3Ti+JO/wCYvhbAb/U

      - name: Build
        run: zig build -Doptimize=${{ matrix.optimize }}

      - name: Unit tests
        run: zig build test -Doptimize=${{ matrix.optimize }}

      - name: Smoke test zwslc-mcp (real STDIO round-trip)
        run: zig build smoke-test-mcp -Doptimize=${{ matrix.optimize }}
