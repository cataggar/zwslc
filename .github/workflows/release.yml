name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-windows
            name: windows-x64
          - target: aarch64-windows
            name: windows-arm64

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Zig via ghr
        uses: cataggar/ghr/actions/install@v0.6.1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tools: |
            cataggar/zig@v0.16.0 RWSGOq2NVecA2UPNdBUZykf1CCb147pkmdtYxgb3Ti+JO/wCYvhbAb/U

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }} -Dstrip=true "-Dversion=${{ steps.version.outputs.version }}"

      - name: Package
        shell: bash
        run: |
          PKGNAME="zwslc-${{ steps.version.outputs.version }}-${{ matrix.name }}"
          mkdir -p "$PKGNAME/bin"
          cp zig-out/bin/zwslc.exe zig-out/bin/zwslc-mcp.exe zig-out/bin/wslcsdk.dll "$PKGNAME/bin/"
          cp LICENSE README.md "$PKGNAME/"
          tar czf "$PKGNAME.tar.gz" "$PKGNAME"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: zig-out/bin/
          output-file: zwslc-${{ steps.version.outputs.version }}-${{ matrix.name }}.sbom.spdx.json
          upload-artifact: false

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.name }}
          path: |
            zwslc-*.tar.gz
            zwslc-*.sbom.spdx.json

  source:
    name: Source tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package source
        run: |
          PKGNAME="zwslc-${{ steps.version.outputs.version }}"
          git archive --format=tar --prefix="$PKGNAME/" HEAD | xz > "$PKGNAME.tar.xz"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: source
          path: |
            zwslc-*.tar.xz

  release:
    name: Create Release
    needs: [build, source]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          merge-multiple: true

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install ghr
        run: pipx install ghr-bin==0.6.1

      - name: Sign archives with minisign (per-asset .minisig sidecars)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          # Only read by `ghr minisign sign` if the secret key is
          # password-encrypted (it isn't, for a key generated with
          # `minisign -G -W` - see docs/mcp-server.md-style rationale in the
          # release plan); kept here for forward-compatibility with a future
          # password-protected key rotation.
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for asset in zwslc-*.tar.gz zwslc-*.tar.xz; do
            # Trusted comment is printed by `ghr install` on successful
            # verification, so encode self-identifying metadata in it.
            comment="timestamp:$(date +%s) file:${asset} commit:${GITHUB_SHA} tag:${GITHUB_REF_NAME}"
            echo "signing ${asset} (trusted comment: ${comment})"
            ghr minisign sign "$asset" -t "$comment"
          done
          ls -la zwslc-*.minisig

      - name: Attest build provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: |
            zwslc-*.tar.gz
            zwslc-*.tar.xz

      - name: Create release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: zwslc ${{ steps.version.outputs.version }}
          body: |
            **Install:**

            ```
            ghr install cataggar/zwslc@v${{ steps.version.outputs.version }} REPLACE_WITH_MINISIGN_PUBLIC_KEY
            ```

            <!-- TODO: replace REPLACE_WITH_MINISIGN_PUBLIC_KEY above with the
                 real minisign public key once it's generated (`minisign -G -W`)
                 and the secret key is stored in the MINISIGN_SECRET_KEY repo
                 secret - see the release plan's "release-minisign-key" step. -->
          files: |
            zwslc-*.tar.gz
            zwslc-*.tar.xz
            zwslc-*.sbom.spdx.json
            zwslc-*.minisig
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'dev') }}
